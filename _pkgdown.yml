url: https://epiforecasts.io/distspec/
template:
  bootstrap: 5
  params:
    bootswatch: lumen

development:
  mode: auto

reference:
  - title: Defining probability distributions
    desc: Constructors for the supported probability distributions.
    contents:
      - Distributions
      - Gamma
      - LogNormal
      - Normal
      - Exp
      - Weibull
      - Beta
      - Fixed
      - NonParametric
      - Dirichlet
      - new_dist_spec
  - title: Access properties
    desc: Extract the type, parameters or probability mass function of a
      distribution.
    contents:
      - get_distribution
      - get_parameters
      - get_pmf
      - ndist
  - title: Summarise distributions
    desc: Summary statistics of a distribution.
    contents:
      - mean.dist_spec
      - sd
      - max.dist_spec
      - is_constrained
  - title: Combine and modify distributions
    desc: Combine, convolve, discretise and fix the parameters of distributions.
    contents:
      - c.dist_spec
      - "`+.dist_spec`"
      - collapse.dist_spec
      - discretise.dist_spec
      - bound_dist
      - fix_parameters.dist_spec
  - title: Sample from distributions
    desc: Draw random samples from a distribution with fixed parameters.
    contents:
      - sample_dist
  - title: Compare distributions
    contents:
      - "`==.dist_spec`"
      - "`!=.dist_spec`"
  - title: Visualise distributions
    desc: Print or plot a distribution.
    contents:
      - print.dist_spec
      - plot.dist_spec
  - title: Parameter helpers
    desc: Lower-level helpers for working with distribution parameters.
    contents:
      - natural_params
      - lower_bounds
      - convert_to_logmean
      - convert_to_logsd
